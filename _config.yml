title: "Gauthier Bassereau"
name: "Gauthier Bassereau"
description: "Deep Learning Engineer — projects, notes, and experiments."
# when the repo is gauthierbassereau.github.io, use your root URL:
url: "https://gauthierbassereau.github.io"

theme: minimal-mistakes-jekyll
minimal_mistakes_skin: "dark"   # try: air, contrast, mint, default

# Social + SEO
repository: "GauthierBassereau/gauthierbassereau.github.io"
logo: "/assets/images/avatar.jpg"   # add your picture here (optional)
author:
  name: "Gauthier Bassereau"
  avatar: "/assets/images/avatar.jpg"
  bio: "Deep Learning Engineer. CV, robotics, simulation, and MLOps."
  location: "Paris, FR"
  links:
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/GauthierBassereau"
    - label: "LinkedIn"
      icon: "fab fa-linkedin"
      url: "https://www.linkedin.com/in/<your-handle>/"
    - label: "Email"
      icon: "fas fa-envelope"
      url: "mailto:<you>@email.com"

# Build & content
permalink: /:categories/:title/
paginate: 6
paginate_path: /page:num/
plugins:
  - jekyll-paginate
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-include-cache

# Collections (for a Projects grid)
collections:
  projects:
    output: true
    permalink: /projects/:path/

# Defaults (layouts & options)
defaults:
  - scope: { path: "", type: posts }
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      toc: true
      toc_sticky: true
  - scope: { path: "", type: projects }
    values:
      layout: single
      classes: wide
      author_profile: true

# Navigation (wired to _data/navigation.yml below)
include: ["_pages"]
