title: "Gauthier Bassereau"
name: "Gauthier Bassereau"
description: "Deep Learning Engineer — projects, notes, and experiments."
# when the repo is gauthierbassereau.github.io, use your root URL:
url: "https://gauthierbassereau.github.io"

remote_theme: mmistakes/minimal-mistakes
minimal_mistakes_skin: "dark"   # try: air, contrast, mint, default
search: false

# Social + SEO
repository: "GauthierBassereau/gauthierbassereau.github.io"
logo: "/assets/images/bio-photo.jpeg"   # add your picture here (optional)
author:
  name: "Gauthier Bassereau"
  avatar: "/assets/images/bio-photo.jpeg"
  bio: "Deep Learning | Robotics."
  location: "Paris, FR"
  links:
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/GauthierBassereau"
    - label: "LinkedIn"
      icon: "fab fa-linkedin"
      url: "https://www.linkedin.com/in/gauthier-bassereau-82b404235/"
    - label: "Email"
      icon: "fas fa-envelope"
      url: "gauthier.bassereau@gmail.com"
    - label: "Phone"
      icon: "fas fa-phone"
      url: "tel:+33651042482"

# Build & content
permalink: /:categories/:title/
paginate: 6
paginate_path: /page:num/
plugins:
  - jekyll-paginate
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-include-cache
  - jekyll-remote-theme

# Defaults (layouts & options)
defaults:
  - scope: { path: "", type: posts }
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      toc: true
      toc_sticky: true

# Navigation (wired to _data/navigation.yml below)
include: ["_pages"]
